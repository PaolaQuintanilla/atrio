name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      # Placeholder values — no real database is contacted (Prisma connects lazily,
      # and pages render dynamically so nothing is prerendered against a DB at build).
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/atria?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/atria?schema=public
      BETTER_AUTH_SECRET: ci-placeholder-secret-0123456789abcdef
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
